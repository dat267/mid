name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  BIN_NAME: ${{ vars.BIN_NAME || github.event.repository.name }}
  KEEP_RELEASES: ${{ vars.KEEP_RELEASES || '3' }}
  PYTHON_VERSION: "3.13"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Lint and type check
        run: |
          uv run ruff check .
          uv run mypy .

      - name: Run tests
        run: uv run pytest

  build:
    name: Build ${{ env.BIN_NAME }}.pyz
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install shiv
        run: uv pip install shiv

      - name: Build .pyz
        run: |
          mkdir -p build
          uv run shiv -o build/${{ env.BIN_NAME }}.pyz \
            -p '/usr/bin/env python3' \
            -e ${{ env.BIN_NAME }}.main:main .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}.pyz
          path: build/${{ env.BIN_NAME }}.pyz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute release tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${BIN_NAME}/${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Release ${BIN_NAME}/${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          files: ${{ env.BIN_NAME }}.pyz

      - name: Prune old releases
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          KEEP=${{ env.KEEP_RELEASES }}
          gh release list --repo "$REPO" --json tagName --jq '.[].tagName' --limit 100 \
            | tail -n +$((KEEP + 1)) \
            | while read tag; do
                gh release delete "$tag" --repo "$REPO" --yes
                gh api -X DELETE "repos/$REPO/git/refs/tags/$tag"
              done

  pypi:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ env.BIN_NAME }}
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build distribution
        run: uv build

      - uses: pypa/gh-action-pypi-publish@v1
