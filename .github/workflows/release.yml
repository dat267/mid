name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: ${{ github.event.repository.name }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy .

      - name: Test
        run: uv run pytest

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv sync --dev
          uv pip install pyinstaller

      - name: Build executable
        run: |
          uv run pyinstaller --onefile --name ${{ env.BIN_NAME }} src/${{ env.BIN_NAME }}/main.py

      - name: Build .pyz
        run: |
          uv run shiv -o build/${{ env.BIN_NAME }}.pyz \
            -p '/usr/bin/env python3' \
            -e ${{ env.BIN_NAME }}.main:main .

      - name: Prepare artifacts
        shell: bash
        run: |
          SUFFIX=""
          [[ "${{ matrix.target }}" == *-windows-* ]] && SUFFIX=".exe"
          OUT="${BIN_NAME}-${{ matrix.target }}${SUFFIX}"
          cp "dist/${BIN_NAME}${SUFFIX}" "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.target }}*
            build/${{ env.BIN_NAME }}.pyz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          gh release create "${BIN_NAME}/${SHORT_SHA}" \
            --repo ${{ github.repository }} \
            --title "Release ${BIN_NAME}/${SHORT_SHA}" \
            ${{ env.BIN_NAME }}-*
        env:
          GH_TOKEN: ${{ github.token }}
