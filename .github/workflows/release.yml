name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy .

      - name: Test
        run: uv run pytest

  build:
    name: Build .pyz
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"

      - name: Install shiv
        run: uv pip install shiv

      - name: Build
        run: |
          mkdir -p build
          uv run shiv -o build/${{ github.event.repository.name }}.pyz \
            -p '/usr/bin/env python3' \
            -e ${{ github.event.repository.name }}.main:main .

      - uses: actions/upload-artifact@v7
        with:
          name: pyz
          path: build/*.pyz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute release tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${{ github.event.repository.name }}/${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Release ${{ github.event.repository.name }}/${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          files: "*.pyz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          KEEP=3
          gh release list --repo ${{ github.repository }} \
            --json tagName --jq '.[].tagName' --limit 100 \
            | tail -n +$((KEEP + 1)) \
            | while read tag; do
                gh release delete "$tag" --repo ${{ github.repository }} --yes
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$tag"
              done
